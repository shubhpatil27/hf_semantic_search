<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Smart Notes Search</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="wrap">
    <h1>Smart Notes Search</h1>
    <p class="sub">Semantic search using sentence-transformers embeddings.</p>

    <div class="card">
      <h2>Add a note</h2>
      <textarea id="noteText" placeholder="Type a note..."></textarea>
      <button id="addBtn">Add Note</button>
      <div id="addMsg" class="msg"></div>
    </div>

    <div class="card">
      <h2>Search</h2>
      <input id="query" placeholder="Search your notes..." />
      <button id="searchBtn">Search</button>
      <div id="results"></div>
    </div>
  </div>

  <script src="./app.js"></script>
</body>
</html>
